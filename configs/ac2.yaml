# Autocorrelation inequalities, AC2. raw metric = lower bound (MAXIMIZE).
# Reward = result (already higher-is-better). entrypoint = construct_function.
# Run with:  python train_multy.py --problem ac2
problem: ac2
problem_type: ac2

# --- problem-specific ---
target: 0.97
budget_s: 1000

# --- model / backend ---
model_name: "openai/gpt-oss-120b"
backend: auto
max_seq_length: 32000

# --- sandbox ---
sandbox_timeout_s: 1100

# --- RL ---
num_steps: 50
groups_per_step: 8
group_size: 64
num_seed_states: 8
learning_rate: 4.0e-5
kl_penalty_coef: 0.1
max_new_tokens: 26000
temperature: 1.0
top_p: 1.0

# --- generation ---
num_gpus: 8
gpu_ids: "0,1,2,3,4,5,6,7"
