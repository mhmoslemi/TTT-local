# Kernel Engineering, MLA-decode (NVIDIA). raw metric = runtime in us (MINIMIZE).
# Reward = score_scale / score_us. entrypoint = custom_kernel.
# Run with:  python train_multy.py --problem gpu_mode --problem-type mla_decode_nvidia
#       (or) python train_multy.py --config configs/gpu_mode_mla.yaml
#
# DEPENDENCY WARNING: same as gpu_mode_trimul.yaml, but the kernel runs on an
# H200 and uses triton 3.4.0. Requires a CUDA GPU, the gpumode stack, the lib
# tree at lib_dir, and launching from the repo root.
problem: gpu_mode
problem_type: mla_decode_nvidia

# --- problem-specific ---
score_scale: 5000
gpu_type: H200
target: 1700           # us, shown in the prompt
task_yaml: examples/gpu_mode/lib/mla-decode/task.yml
lib_dir: examples/gpu_mode/lib

# --- model / backend ---
model_name: "openai/gpt-oss-120b"
backend: auto
max_seq_length: 32000

# --- sandbox (unused for gpu_mode; kept for engine uniformity) ---
sandbox_timeout_s: 1300

# --- RL ---
num_steps: 50
groups_per_step: 8
group_size: 64
num_seed_states: 8
learning_rate: 4.0e-5
kl_penalty_coef: 0.1
max_new_tokens: 26000
temperature: 1.0
top_p: 1.0

# --- generation ---
num_gpus: 8
gpu_ids: "0,1,2,3,4,5,6,7"
