
problem: gpu_mode
problem_type: mla_decode_nvidia

# --- problem-specific ---
score_scale: 5000
gpu_type: H200
target: 1700          
task_yaml: examples/gpu_mode/lib/mla-decode/task.yml
lib_dir: examples/gpu_mode/lib

# --- model / backend ---
model_name: "openai/gpt-oss-120b"
backend: auto
max_seq_length: 32000

# --- sandbox ---
sandbox_timeout_s: 1300

# --- RL ---
num_steps: 50
groups_per_step: 8
group_size: 64
num_seed_states: 8
learning_rate: 4.0e-5
kl_penalty_coef: 0.1
max_new_tokens: 26000
temperature: 1.0
top_p: 1.0

# --- generation ---
num_gpus: 8
gpu_ids: "0,1,2,3,4,5,6,7"
