# Circle packing (n=26). Reward = sum of radii (maximize, higher-is-better).
# Run with:  python train_multy.py --problem circle_packing
problem: circle_packing

# --- problem-specific ---
num_circles: 26
target: 2.636          # 2.940 for n=32
# entrypoint is fixed in code (run_packing); metric_name="sum of radii"; maximize=true

# --- model / backend ---
model_name: "Qwen/Qwen3-8B"
backend: auto
max_seq_length: 32000

# --- sandbox ---
sandbox_timeout_s: 530   # matches the paper's circle_packing eval_timeout

# --- RL ---
num_steps: 50
groups_per_step: 8
group_size: 64
num_seed_states: 8
learning_rate: 4.0e-5
kl_penalty_coef: 0.1
max_new_tokens: 6700
temperature: 1.0
top_p: 1.0

# --- generation ---
num_gpus: 8
gpu_ids: "0,1,2,3,4,5,6,7"
