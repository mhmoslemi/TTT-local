problem: circle_packing

# --- problem-specific ---
num_circles: 26
target: 2.636          # 2.940 for n=32

# --- model / backend ---
model_name: "Qwen/Qwen3-8B"
backend: auto
max_seq_length: 32000

# --- sandbox ---
sandbox_timeout_s: 100 # 530   
# --- RL ---
num_steps: 50
groups_per_step: 8
group_size: 64
num_seed_states: 8
learning_rate: 4.0e-5
kl_penalty_coef: 0.1
max_new_tokens: 4000 # 6700
temperature: 1.0
top_p: 1.0

# --- generation ---
# num_gpus: 8
# num_gpus: 1
# gpu_ids : "0,1,2,3,4,5,6,7"
# gpu_ids: "1"
# Multi-GPU generation
num_gpus: 3
gpu_ids: "1,2,3"

# num_gpus: int = 1
# gpu_ids: str = "0,1,2,3,4,5,6,7"



