# --- Elo re-ranker (multi-agent, background, fully local) ---
reranker_enabled: true
reranker_backend: local                 # local HF judge process, no server
reranker_model: "Qwen/Qwen3-8B"         # any HF causal LM; smaller is fine
reranker_judge_gpu: 0                    # a GPU not used by training/generation
reranker_judge_batch_size: 16            # matches per batched generate()
reranker_judge_load_in_4bit: false       # set true to co-reside on a used GPU (~6GB)
reranker_debate: false                   # single-turn: short, verdict always fits
reranker_max_tokens: 3000 # 512                 # tight budget; only need rationale + verdict
reranker_temperature: 0.7
reranker_top_p: 1.0
reranker_top_k: 20
reranker_tournament_mode: round_robin    # or "random" + num_random_matches to cut cost
reranker_num_random_matches: 60
reranker_elo_k: 24.0
reranker_elo_softmax_temp: 100.0
reranker_prior_weight: 1.0
reranker_poll_interval_s: 5.0