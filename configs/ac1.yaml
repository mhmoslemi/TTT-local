# Autocorrelation inequalities, AC1. raw metric = upper bound (MINIMIZE).
# Reward = 1 / (1e-8 + result). entrypoint = propose_candidate.
# Run with:  python train_multy.py --problem ac1
problem: ac1
problem_type: ac1

# --- problem-specific ---
target: 1.5030
budget_s: 1000         # injected into the search function's time budget

# --- model / backend ---
model_name: "openai/gpt-oss-120b"
backend: auto
max_seq_length: 32000

# --- sandbox ---
sandbox_timeout_s: 1100   # eval_timeout=1100 in the paper (budget_s=1000 + slack)

# --- RL ---
num_steps: 50
groups_per_step: 8
group_size: 64
num_seed_states: 8
learning_rate: 4.0e-5
kl_penalty_coef: 0.1
max_new_tokens: 26000
temperature: 1.0
top_p: 1.0

# --- generation ---
num_gpus: 8
gpu_ids: "0,1,2,3,4,5,6,7"
