# Kernel Engineering, GPUMode TriMul. raw metric = runtime in us (MINIMIZE).
# Reward = score_scale / score_us. entrypoint = custom_kernel.
# Run with:  python train_multy.py --problem gpu_mode --problem-type trimul
#       (or) python train_multy.py --config configs/gpu_mode_trimul.yaml
#
# DEPENDENCY WARNING: this problem does NOT use the subprocess sandbox. It runs
# the libkernelbot harness LOCALLY (no Modal). It requires:
#   - a CUDA GPU (H100 for trimul) on the machine running train_multy.py
#   - triton 3.3.1 and the gpumode stack: requirements/requirements-gpumode.txt
#   - the lib tree present at lib_dir (examples/gpu_mode/lib)
#   - train_multy.py launched from the repo root so `examples...` resolves
problem: gpu_mode
problem_type: trimul

# --- problem-specific ---
score_scale: 1500
gpu_type: H100
target: 1000           # us, shown in the prompt
task_yaml: examples/gpu_mode/lib/bioml/trimul/task.yml
lib_dir: examples/gpu_mode/lib

# --- model / backend ---
model_name: "openai/gpt-oss-120b"
backend: auto
max_seq_length: 32000

# --- sandbox (unused for gpu_mode; kept for engine uniformity) ---
sandbox_timeout_s: 1300

# --- RL ---
num_steps: 50
groups_per_step: 8
group_size: 64
num_seed_states: 8
learning_rate: 4.0e-5
kl_penalty_coef: 0.1
max_new_tokens: 26000
temperature: 1.0
top_p: 1.0

# --- generation ---
num_gpus: 8
gpu_ids: "0,1,2,3,4,5,6,7"
