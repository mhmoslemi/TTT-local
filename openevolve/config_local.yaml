max_iterations: 100
checkpoint_interval: 10
random_seed: 42

llm:
  models:
    - name: "Qwen/Qwen3-8B"
      weight: 1.0
  temperature: 0.6
  top_p: 0.95
  max_tokens: 24576

prompt:
  system_message: |
    You are an expert programmer specializing in computational geometry and numerical optimization.
    Improve the circle packing constructor to maximize the sum of radii of 26 non-overlapping circles in a unit square.
  num_top_programs: 3
  num_diverse_programs: 2

database:
  population_size: 60
  num_islands: 4
  exploitation_ratio: 0.7

evaluator:
  timeout: 650
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 1

diff_based_evolution: true
max_code_length: 20000